project: BrassicaceaeGenomeFM
updated_at: "2026-06-09 10:12:51 CST"

raw_genome_root: raw_genomes

manifest:
  assemblies: data_manifests/brassicaceae_assemblies.tsv
  splits: data_manifests/brassicaceae_splits.tsv

sequence_index:
  contigs: sequence_index/contigs.tsv
  assembly_qc: sequence_index/assembly_qc.tsv
  checksums: sequence_index/fasta_checksums.tsv

annotation_index:
  features_glob: annotation_index/features.shard*.tsv
  introns_glob: annotation_index/introns.shard*.tsv
  feature_summary: annotation_index/annotation_feature_summary.tsv
  coordinate_qc: annotation_index/annotation_coordinate_qc.tsv

sampling_index:
  region_candidates:
    4096: sampling_index/region_candidates_4k.shard*.tsv
    8192: sampling_index/region_candidates_8k.shard*.tsv
    16384: sampling_index/region_candidates_16k.shard*.tsv
  region_candidate_summary:
    4096: data_manifests/region_candidates_4k_summary.tsv
    8192: data_manifests/region_candidates_8k_summary.tsv
    16384: data_manifests/region_candidates_16k_summary.tsv

stage_b_sampling:
  formal_training: true
  input_tokenization: single_nucleotide
  dynamic_masking: true
  dynamic_reverse_complement: true
  mask_rate: 0.15
  target_context_mix:
    4096: 0.20
    8192: 0.70
    16384: 0.10
  region_weight_column: region_weight
  split_column: split

token_shards:
  gpu_ready: true
  directory: stage_b_token_shards
  manifest: stage_b_token_shards/manifest.tsv
  summary: stage_b_token_shards/summary.json
  shard_plan: data_manifests/stage_b_token_shard_plan.tsv
  dtype: uint8
  token_map:
    A: 0
    C: 1
    G: 2
    T: 3
    N: 4
  dynamic_masking: true
  dynamic_reverse_complement: true
